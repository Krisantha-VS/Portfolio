<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="1050" cy="100" r="300" fill="url(#orb1)" filter="url(#blur1)"/>
  <circle cx="150" cy="500" r="280" fill="url(#orb2)" filter="url(#blur2)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" ry="20"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="64" y="160" width="4" height="80" rx="2" fill="url(#grad)"/>

  <!-- Main content -->

  <!-- Availability badge -->
  <rect x="64" y="64" width="220" height="36" rx="18" fill="rgba(99,102,241,0.15)"
        stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="86" cy="82" r="6" fill="#10b981" opacity="0.9"/>
  <text x="100" y="87" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" fill="#a5b4fc" font-weight="500">Open to Remote Work</text>

  <!-- Name -->
  <text x="72" y="195" font-family="system-ui, -apple-system, sans-serif"
        font-size="62" font-weight="800" letter-spacing="-2" fill="url(#grad)">
    Krisantha Sarma
  </text>

  <!-- Title -->
  <text x="76" y="248" font-family="system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="600" fill="rgba(255,255,255,0.7)">
    Full Stack Engineer · C# · .NET 8 · Blazor · SAP
  </text>

  <!-- Divider -->
  <line x1="72" y1="280" x2="520" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Metrics row -->
  <!-- Metric 1 -->
  <text x="72" y="330" font-family="system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="800" fill="white">8+</text>
  <text x="72" y="355" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" fill="rgba(255,255,255,0.5)" font-weight="500">Years Experience</text>

  <!-- Metric 2 -->
  <text x="200" y="330" font-family="system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="800" fill="white">15+</text>
  <text x="200" y="355" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" fill="rgba(255,255,255,0.5)" font-weight="500">Enterprise Apps</text>

  <!-- Metric 3 -->
  <text x="360" y="330" font-family="system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="800" fill="white">$50K+</text>
  <text x="360" y="355" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" fill="rgba(255,255,255,0.5)" font-weight="500">Cost Savings Delivered</text>

  <!-- Skills tags -->
  <rect x="72" y="390" width="90" height="30" rx="8" fill="rgba(99,102,241,0.2)"
        stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="117" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#a5b4fc" text-anchor="middle" font-weight="500">C# / .NET</text>

  <rect x="172" y="390" width="80" height="30" rx="8" fill="rgba(168,85,247,0.2)"
        stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="212" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#d8b4fe" text-anchor="middle" font-weight="500">Blazor</text>

  <rect x="262" y="390" width="80" height="30" rx="8" fill="rgba(236,72,153,0.2)"
        stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
  <text x="302" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#f9a8d4" text-anchor="middle" font-weight="500">SAP RFC</text>

  <rect x="352" y="390" width="100" height="30" rx="8" fill="rgba(99,102,241,0.2)"
        stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="402" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#a5b4fc" text-anchor="middle" font-weight="500">SQL Server</text>

  <rect x="462" y="390" width="100" height="30" rx="8" fill="rgba(168,85,247,0.2)"
        stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="512" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="13" fill="#d8b4fe" text-anchor="middle" font-weight="500">TypeScript</text>

  <!-- URL -->
  <text x="72" y="575" font-family="system-ui, -apple-system, sans-serif"
        font-size="16" fill="rgba(255,255,255,0.3)" font-weight="400">
    krisantha-sarma.dev
  </text>

  <!-- Right side decorative element -->
  <rect x="820" y="160" width="300" height="310" rx="24" fill="rgba(255,255,255,0.03)"
        stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Code snippet decoration -->
  <text x="848" y="210" font-family="monospace" font-size="13" fill="rgba(99,102,241,0.6)">// Enterprise Architecture</text>
  <text x="848" y="235" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">var <tspan fill="#a5b4fc">app</tspan> = WebApplication</text>
  <text x="848" y="258" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">  .CreateBuilder(args)</text>
  <text x="848" y="281" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">  .<tspan fill="#f9a8d4">AddSAPIntegration</tspan>()</text>
  <text x="848" y="304" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">  .<tspan fill="#f9a8d4">AddBlazorServer</tspan>()</text>
  <text x="848" y="327" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">  .<tspan fill="#f9a8d4">AddSignalR</tspan>()</text>
  <text x="848" y="350" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.4)">  .<tspan fill="#f9a8d4">Build</tspan>();</text>
  <text x="848" y="390" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.25)">await app.<tspan fill="#10b981">RunAsync</tspan>();</text>
  <text x="848" y="420" font-family="monospace" font-size="11" fill="rgba(16,185,129,0.5)">✓ 0 incidents in production</text>
  <text x="848" y="440" font-family="monospace" font-size="11" fill="rgba(16,185,129,0.5)">✓ 45% performance improvement</text>
  <text x="848" y="460" font-family="monospace" font-size="11" fill="rgba(16,185,129,0.5)">✓ $50K+ cost savings</text>
</svg>
